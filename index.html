<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KB PIR 지수</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; }
    .wrap { width: 100%; height: 560px; }
    #status { font-size: 13px; color: #666; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="status">데이터 불러오는 중...</div>
  <div class="wrap">
    <canvas id="chart"></canvas>
  </div>

  <script>
    const API_URL = "https://delicate-salad-c8f7.ipsw97.workers.dev/";

    async function loadData() {
      const status = document.getElementById("status");

      const res = await fetch(API_URL);
      const json = await res.json();
      console.log("KB PIR response:", json);

      const rows = json.dataBody?.data || [];

      if (!rows.length) {
        status.textContent = "데이터가 없습니다. Worker 또는 API 응답을 확인하세요.";
        return;
      }

      const regions = ["서울", "경기", "인천"];
      const labels = rows.map(row => row.분기 || row.날짜);

      const datasets = regions.map(region => ({
        label: region,
        data: rows.map(row => row.정보?.[region]?.PIR ?? null),
        fill: false,
        tension: 0.25
      }));

      status.textContent = `업데이트 완료: ${labels[0]} ~ ${labels[labels.length - 1]}`;

      new Chart(document.getElementById("chart"), {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: {
              display: true,
              text: "KB PIR 지수"
            },
            legend: { position: "bottom" },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.raw}`
              }
            }
          },
          scales: {
            y: {
              title: { display: true, text: "PIR" }
            }
          }
        }
      });
    }

    loadData().catch(err => {
      console.error(err);
      document.getElementById("status").textContent =
        "데이터를 불러오지 못했습니다: " + err;
    });
  </script>
</body>
</html>
